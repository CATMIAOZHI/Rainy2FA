name: Release

on:
  push:
    tags:
  workflow_dispatch:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-35 build-tools;35.0.0'

      - name: Decode Keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > release.jks

      - name: Set Signing Credentials
        run: |
          echo "KEYSTORE_PASSWORD=${{ secrets.KEYSTORE_PASSWORD }}" >> $GITHUB_ENV
          echo "KEYSTORE_ALIAS=${{ secrets.KEY_ALIAS }}" >> $GITHUB_ENV
          echo "KEY_PASSWORD=${{ secrets.KEY_PASSWORD }}" >> $GITHUB_ENV

      - name: Grant Gradlew Permission
        run: chmod +x gradlew

      - name: Fix Gradle Wrapper URL
        run: |
          sed -i 's|file:///root/gradle/gradle-9.1.0-bin.zip|https://services.gradle.org/distributions/gradle-9.1.0-bin.zip|' gradle/wrapper/gradle-wrapper.properties

      - name: Build Release APK
        run: ./gradlew assembleRelease

      - name: Rename APK
        run: |
          TAG_NAME=${GITHUB_REF#refs/tags/}
          cp app/build/outputs/apk/release/app-release.apk "Rainy2FA-${TAG_NAME}.apk"

      - name: Create Release & Upload
        uses: softprops/action-gh-release@v2
        with:
          name: "🎉 雨晴 2FA ${{ github.ref_name }}"
          body: |
            ## 🐱 雨晴 2FA ${{ github.ref_name }}

            > 喵呜~ 新版本发布啦！💖

            ### 📦 下载
            - 点击下方 **Rainy2FA-${{ github.ref_name }}.apk** 下载安装

            ### 🔐 签名版本
            本 APK 为 Release 签名版本，可直接安装使用。

            ---
            *Made with ❤️ and 🐱 paws by Rainy*
          files: Rainy2FA-${{ github.ref_name }}.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}